<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Arka plan için hafif bir degrade -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E24" />
      <stop offset="100%" stop-color="#0A0A0F" />
    </linearGradient>

    <!-- Oynat butonu ve dalgalar için Vibestreamer Moru ve Turkuaz geçişi -->
    <linearGradient id="vibeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BB86FC" />
      <stop offset="100%" stop-color="#03DAC6" />
    </linearGradient>

    <!-- Parlama efekti (Glow) -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Uygulama İkonu Arka Planı (Yuvarlak Hatlı Kare) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- İç Parıltı / Çerçeve Efekti (İsteğe Bağlı) -->
  <rect width="508" height="508" x="2" y="2" rx="110" fill="none" stroke="#2A2A35" stroke-width="4" />

  <g transform="translate(24, 0)">
    <!-- Oynat (Play) Butonu -->
    <path d="M150 160 C150 145, 166 136, 178 144 L306 232 C318 240, 318 256, 306 264 L178 352 C166 360, 150 351, 150 336 Z" 
          fill="url(#vibeGrad)" filter="url(#glow)" />

    <!-- "Vibe" / Yayın Dalgaları -->
    <!-- Birinci (İç) Dalga -->
    <path d="M 340 196 Q 375 248 340 300" 
          fill="none" stroke="url(#vibeGrad)" stroke-width="24" stroke-linecap="round" />

    <!-- İkinci (Dış) Dalga -->
    <path d="M 380 146 Q 440 248 380 350" 
          fill="none" stroke="url(#vibeGrad)" stroke-width="24" stroke-linecap="round" opacity="0.6" />
          
    <!-- Üçüncü (En Dış - Soluk) Dalga -->
    <path d="M 420 96 Q 505 248 420 400" 
          fill="none" stroke="url(#vibeGrad)" stroke-width="24" stroke-linecap="round" opacity="0.2" />
  </g>
</svg>