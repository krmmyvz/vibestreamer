name: Build Vibestreamer

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ─── Linux Build ────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake build-essential ninja-build \
            libmpv-dev \
            qt6-base-dev libqt6opengl6-dev libqt6svg6-dev \
            libgl-dev libglu1-mesa-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-shape0 libxcb-xinerama0 fuse \
            wget libzstd-dev imagemagick

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -GNinja

      - name: Build
        run: cmake --build build --parallel

      - name: Create AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          
          # Copy main binary
          cp build/Vibestreamer AppDir/usr/bin/
          
          # BUNDLE libmpv for portability (Linux users might not have it installed)
          # We'll copy the .so to usr/lib
          cp /usr/lib/x86_64-linux-gnu/libmpv.so.1 AppDir/usr/lib/ 2>/dev/null || cp /usr/lib/libmpv.so.1 AppDir/usr/lib/ || true

          # Desktop file
          cat > AppDir/Vibestreamer.desktop << 'EOF'
          [Desktop Entry]
          Name=Vibestreamer
          Exec=Vibestreamer
          Icon=vibestreamer
          Type=Application
          Categories=AudioVideo;Player;Network;
          Comment=Modern IPTV player
          Terminal=false
          EOF

          # Create a simple 512x512 PNG icon (white square) for linuxdeploy
          # In a real scenario, use actual icons.
          convert -size 512x512 xc:white AppDir/usr/share/icons/hicolor/512x512/apps/vibestreamer.png 2>/dev/null || touch AppDir/usr/share/icons/hicolor/512x512/apps/vibestreamer.png

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

      - name: Build AppImage
        env:
          QMAKE: /usr/bin/qmake6
          QML_SOURCES_PATHS: .
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --icon-file AppDir/usr/share/icons/hicolor/512x512/apps/vibestreamer.png \
            2>&1 || true
          
          # If AppImage failed, ensure tar.gz has the bundled libraries
          if [ ! -f Vibestreamer*.AppImage ]; then
            # Create a portable folder structure for tar.gz
            mkdir -p release/bin
            mkdir -p release/lib
            cp build/Vibestreamer release/bin/
            cp AppDir/usr/lib/libmpv.so* release/lib/ 2>/dev/null || true
            
            # Simple wrapper script
            cat > release/Vibestreamer.sh << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/lib:$LD_LIBRARY_PATH"
          exec "$HERE/bin/Vibestreamer" "$@"
          EOF
            chmod +x release/Vibestreamer.sh
            tar -czf Vibestreamer-linux-x86_64-portable.tar.gz -C release .
          else
            mv Vibestreamer*.AppImage Vibestreamer-linux-x86_64.AppImage
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibestreamer-linux-x86_64
          path: |
            Vibestreamer-linux-x86_64.AppImage
            Vibestreamer-linux-x86_64.tar.gz
          if-no-files-found: warn

  # ─── macOS Build ────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install mpv cmake ninja

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.7.0"
          host: mac
          target: desktop
          modules: "qtmultimedia qtimageformats"

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -GNinja

      - name: Build
        run: cmake --build build --parallel

      - name: Bundle app with macdeployqt
        run: |
          # Create proper .app structure
          APP_DIR="build/Vibestreamer.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp build/Vibestreamer "$APP_DIR/Contents/MacOS/"

          cat > "$APP_DIR/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>Vibestreamer</string>
            <key>CFBundleIdentifier</key><string>com.krmmyvz.vibestreamer</string>
            <key>CFBundleName</key><string>Vibestreamer</string>
            <key>CFBundleVersion</key><string>2.0</string>
            <key>CFBundleShortVersionString</key><string>2.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>CFBundlePackageType</key><string>APPL</string>
          </dict>
          </plist>
          EOF

          macdeployqt "$APP_DIR" -dmg 2>&1 || true

          if [ -f "build/Vibestreamer.dmg" ]; then
            mv build/Vibestreamer.dmg Vibestreamer-macOS-arm64.dmg
          else
            cd build && zip -r ../Vibestreamer-macOS-arm64.zip Vibestreamer.app
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibestreamer-macos-arm64
          path: |
            Vibestreamer-macOS-arm64.dmg
            Vibestreamer-macOS-arm64.zip
          if-no-files-found: warn

  # ─── Windows Build ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.7.0"
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: "qtmultimedia qtimageformats"

      - name: Download libmpv
        shell: pwsh
        run: |
          # Download mpv dev package from shinchiro's builds
          $mpvUrl = "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260307/mpv-dev-x86_64-20260307-git-f9190e5.7z"
          Invoke-WebRequest -Uri $mpvUrl -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-dev

      - name: Install Visual Studio tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install ZLIB
        run: vcpkg install zlib:x64-windows

      - name: Configure
        shell: pwsh
        run: |
          $mpvDir = "${{ github.workspace }}\mpv-dev"
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DMPV_DIR="$mpvDir"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package Windows release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item "build\Release\Vibestreamer.exe" dist\
          # Copy mpv dll
          Copy-Item "${{ github.workspace }}\mpv-dev\mpv-2.dll" dist\ -ErrorAction SilentlyContinue
          Copy-Item "${{ github.workspace }}\mpv-dev\libmpv-2.dll" dist\ -ErrorAction SilentlyContinue
          # Deploy Qt DLLs
          & "$env:Qt6_DIR\bin\windeployqt.exe" dist\Vibestreamer.exe --release --no-translations 2>&1
          Compress-Archive -Path dist\* -DestinationPath Vibestreamer-Windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibestreamer-windows-x64
          path: Vibestreamer-Windows-x64.zip

  # ─── Release (on tag push) ──────────────────────────────────────────────────
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Vibestreamer ${{ github.ref_name }}"
          body: |
            ## Vibestreamer ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🐧 Linux x86_64 | `Vibestreamer-linux-x86_64.AppImage` |
            | 🍎 macOS ARM64 | `Vibestreamer-macOS-arm64.dmg` |
            | 🪟 Windows x64 | `Vibestreamer-Windows-x64.zip` |
          files: artifacts/**
          draft: false
          prerelease: false
